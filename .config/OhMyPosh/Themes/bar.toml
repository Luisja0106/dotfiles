
[secondary_prompt]
  template = 'п…ё '
  foreground = 'p:purple'
  background = 'transparent'

[transient_prompt]
  template = ' вқҜвқҜ {{ .AbsolutePWD }} : '
  background = 'transparent'
  foreground_templates = ['{{ if eq .Code 0 }}p:green{{ else }}p:red{{ end }}']
  newline = true

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    template = "\nв•ӯв”Җ"
    foreground = 'p:fg'
    type = 'text'
    style = 'plain'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    template = '{{ .UserName }}'
    foreground = 'p:paths'
    background = 'p:bg'
    type = 'session'
    style = 'diamond'

  [[blocks.segments]]
    trailing_diamond = 'оӮ°'
    template = ' {{.Icon}} '
    foreground = 'p:paths'
    background = 'p:bg'
    type = 'os'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = '<transparent,p:paths>оӮ°</>'
    trailing_diamond = 'оӮ°'
    template = ' {{ .Path }} '
    foreground = 'p:pathsFg'
    background = 'p:paths'
    type = 'path'
    style = 'diamond'

    [blocks.segments.properties]
      folder_icon = '...'
      folder_separator_icon = '<transparent> оӮұ </>'
      home_icon = 'уұӮ¶ '
      style = 'agnoster_short'

      [blocks.segments.properties.mapped_locations]
        '~/.config' = 'о—ј '
        '~/dotfiles' = 'п’Ӯ '

  [[blocks.segments]]
    leading_diamond = '<transparent,background>оӮ°</>'
    trailing_diamond = 'оӮ°'
    template = '<transparent> оӘҮ </> {{ reason .Code }} '
    foreground = 'p:fg'
    background = 'p:red'
    type = 'status'
    style = 'diamond'

[[blocks]]
  type = 'rprompt'
  overflow = 'hidden'

  [[blocks.segments]]
    template = '{{ .FormattedMs }}'
    foreground = 'p:gray'
    type = 'executiontime'
    style = 'plain'

    [blocks.segments.properties]
      style = 'round'
      threshold = 5000

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = 'оңҘ ({{ url .UpstreamIcon .UpstreamURL }} {{ url .HEAD .UpstreamURL }}){{ if gt .Ahead 0 }}<p:green> +{{ .Ahead }}</>{{ end }}{{ if gt .Behind 0 }}<red> -{{ .Behind }} </>{{ end }}{{ if .Working.Changed }}<p:fg> оёј {{ .Working.String }}</>{{ end }}{{ if .Staging.Changed }}<p:fg> п…Ҡ {{ .Staging.String }}</>{{ end }}'
    foreground = 'p:bg'
    background = 'p:yellow'
    type = 'git'
    style = 'diamond'

    [blocks.segments.properties]
      branch_icon = ''
      cache_duration = 'none'
      display_changing_color = true
      fetch_status = true
      fetch_upstream_icon = true
      full_branch_path = true

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = 'оңҳ {{ .Full }}'
    foreground = 'p:bg'
    background = 'p:green'
    type = 'node'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = 'оңһ {{ .Full }}'
    foreground = 'p:bg'
    background = 'p:red'
    type = 'npm'
    style = 'diamond'

    [blocks.segments.properties]
      display_mode = 'files'
      extensions = ['package-lock.json']

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = 'у°ӢҒ {{ .Full }}'
    foreground = 'p:bg'
    background = 'p:orange'
    type = 'pnpm'
    style = 'diamond'

    [blocks.segments.properties]
      display_mode = 'files'
      extensions = ['pnpm-lock.yaml']

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = 'оңј {{ .Full }}'
    foreground = 'p:bg'
    background = 'p:blue'
    type = 'python'
    style = 'diamond'

    [blocks.segments.properties]
      display_mode = 'files'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = 'оңё {{ .Full }}'
    foreground = 'p:bg'
    background = 'p:red'
    type = 'java'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = 'оңҪ {{ .Full }}'
    foreground = 'p:bg'
    background = 'p:blue'
    type = 'php'
    style = 'diamond'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = 'в•°в”Җ вқҜвқҜ'
    foreground = 'p:fg'
    type = 'text'
    style = 'diamond'

    [blocks.segments.properties]
      alway_enabled = true
