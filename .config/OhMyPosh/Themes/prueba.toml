console_title_template = '{{if .Root}} вљЎ {{end}}{{.Folder | replace "~" "рџЏ "}} @ {{.HostName}}'
version = 3
final_space = true

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = 'о‚¶'
    trailing_diamond = 'о‚°'
    template = ' {{ .Icon }} '
    foreground = '#FFFFFF'
    background = '#0C212F'
    type = 'os'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = '<transparent,#DE2121>о‚°</>'
    trailing_diamond = 'о‚°'
    template = ' пѓ§ '
    foreground = '#FFFFFF'
    background = '#DE2121'
    type = 'root'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = '<transparent,#26BDBB>о‚°</>'
    trailing_diamond = 'о‚°'
    template = ' {{ .Path }} '
    foreground = '#0C212F'
    background = '#26BDBB'
    type = 'path'
    style = 'diamond'

    [blocks.segments.properties]
      folder_icon = '...'
      folder_separator_icon = '<transparent> о‚± </>'
      home_icon = 'о¬†'
      style = 'agnoster_short'

  [[blocks.segments]]
    template = ' {{ .UpstreamIcon }}{{ .HEAD }}{{ if .Staging.Changed }} пЃ† {{ .Staging.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }} пЃ„ {{ .Working.String }}{{ end }}{{ if gt .StashCount 0 }} о­‹ {{ .StashCount }}{{ end }} '
    foreground = '#FFFFFF'
    powerline_symbol = 'о‚°'
    background = '#280C2E'
    type = 'git'
    style = 'powerline'
    background_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}#7621DE{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#7621DE{{ end }}', '{{ if gt .Ahead 0 }}#7621DE{{ end }}', '{{ if gt .Behind 0 }}#7621DE{{ end }}']

    [blocks.segments.properties]
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    leading_diamond = '<transparent,#0C212F>о‚°</>'
    trailing_diamond = 'о‚°'
    template = ' {{ .CurrentDate | date .Format }} '
    foreground = '#FFFFFF'
    background = '#0C212F'
    type = 'time'
    style = 'diamond'

    [blocks.segments.properties]
      time_format = '15:04'

  [[blocks.segments]]
    leading_diamond = '<transparent,#26BDBB>о‚°</>'
    trailing_diamond = 'о‚°'
    template = ' {{ .FormattedMs }}s '
    foreground = '#0C212F'
    background = '#26BDBB'
    type = 'executiontime'
    style = 'diamond'

    [blocks.segments.properties]
      style = 'dallas'
      threshold = 0.0

  [[blocks.segments]]
    leading_diamond = '<transparent,background>о‚°</>'
    trailing_diamond = 'о‚°'
    template = '<transparent> п„Є</> {{ reason .Code }} '
    foreground = '#ffffff'
    background = '#910000'
    type = 'status'
    style = 'diamond'
